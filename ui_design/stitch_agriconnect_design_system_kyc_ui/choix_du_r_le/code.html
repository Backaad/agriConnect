<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background min-h-screen font-body-main text-text-main flex flex-col antialiased">
<!-- Main Content Area -->
<main class="flex-1 px-screen-edge py-xl flex flex-col max-w-md mx-auto w-full">
<!-- Header Section -->
<header class="text-center mb-xl">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container text-on-primary mb-lg shadow-[0_4px_12px_rgba(27,108,168,0.2)]">
<span class="material-symbols-outlined text-[32px]">agriculture</span>
</div>
<h1 class="font-h1 text-h1 text-text-main mb-sm">Bienvenue sur AgriConnect</h1>
<p class="font-body-main text-body-main text-text-muted">Comment allez-vous utiliser l'app ?</p>
</header>
<!-- Role Selection Cards -->
<div class="flex flex-col gap-card-gap mb-xl flex-1">
<!-- Card 1: Agriculteur (Selected) -->
<button class="flex items-start text-left p-md bg-surface rounded-xl border-2 border-primary-container shadow-[0_8px_24px_rgba(27,108,168,0.1)] relative overflow-hidden transition-all duration-200 scale-[1.01]">
<div class="absolute top-0 right-0 w-0 h-0 border-t-[40px] border-l-[40px] border-t-primary-container border-l-transparent">
<span class="material-symbols-outlined absolute -top-[36px] -left-[18px] text-on-primary text-[18px] icon-fill">check</span>
</div>
<div class="flex-shrink-0 w-12 h-12 rounded-lg bg-primary-container/10 text-primary-container flex items-center justify-center mr-md">
<span class="material-symbols-outlined text-[24px]">grass</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-text-main mb-xs">Agriculteur / Producteur</h3>
<p class="font-body-secondary text-body-secondary text-text-muted">Je cherche de la main-d'oeuvre et/ou je vends mes récoltes</p>
</div>
</button>
<!-- Card 2: Travailleur agricole -->
<button class="flex items-start text-left p-md bg-surface rounded-xl border border-border shadow-[0_4px_12px_rgba(0,0,0,0.05)] hover:border-outline-variant hover:shadow-[0_8px_16px_rgba(0,0,0,0.08)] transition-all duration-200 active:scale-[0.98]">
<div class="flex-shrink-0 w-12 h-12 rounded-lg bg-surface-container text-text-muted flex items-center justify-center mr-md">
<span class="material-symbols-outlined text-[24px]">front_hand</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-text-main mb-xs">Travailleur agricole</h3>
<p class="font-body-secondary text-body-secondary text-text-muted">Je cherche des missions agricoles près de chez moi</p>
</div>
</button>
<!-- Card 3: Consommateur -->
<button class="flex items-start text-left p-md bg-surface rounded-xl border border-border shadow-[0_4px_12px_rgba(0,0,0,0.05)] hover:border-outline-variant hover:shadow-[0_8px_16px_rgba(0,0,0,0.08)] transition-all duration-200 active:scale-[0.98]">
<div class="flex-shrink-0 w-12 h-12 rounded-lg bg-surface-container text-text-muted flex items-center justify-center mr-md">
<span class="material-symbols-outlined text-[24px]">shopping_cart</span>
</div>
<div>
<h3 class="font-h3 text-h3 text-text-main mb-xs">Consommateur</h3>
<p class="font-body-secondary text-body-secondary text-text-muted">J'achète des produits frais directement aux producteurs</p>
</div>
</button>
</div>
<!-- Sticky Bottom Action -->
<div class="mt-auto pt-lg">
<button class="w-full h-[52px] bg-primary-container text-on-primary font-button-label text-button-label rounded-lg shadow-[0_4px_12px_rgba(27,108,168,0.2)] hover:bg-primary-container/90 active:scale-[0.97] transition-all duration-150 flex items-center justify-center gap-sm">
                Continuer
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</main>
