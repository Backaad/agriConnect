<h1 class="font-h2 text-h2 text-text-main absolute left-1/2 -translate-x-1/2">Notifications</h1>
<button class="font-button-label text-button-label text-primary-container active:scale-95 transition-all">Tout lu</button>
</header>
<main class="pt-[88px] px-screen-edge pb-section-v">
<!-- Tabs -->
<div class="flex overflow-x-auto gap-sm mb-section-v pb-sm no-scrollbar">
<button class="whitespace-nowrap px-md py-sm rounded-full bg-primary-container text-on-primary font-body-secondary text-body-secondary active:scale-95 transition-all">Toutes</button>
<button class="whitespace-nowrap px-md py-sm rounded-full bg-surface-container-low text-text-muted font-body-secondary text-body-secondary flex items-center gap-2 active:scale-95 transition-all">
                Non lues

</button>
<button class="whitespace-nowrap px-md py-sm rounded-full bg-surface-container-low text-text-muted font-body-secondary text-body-secondary active:scale-95 transition-all">Missions</button>
<button class="whitespace-nowrap px-md py-sm rounded-full bg-surface-container-low text-text-muted font-body-secondary text-body-secondary active:scale-95 transition-all">Paiements</button>
<button class="whitespace-nowrap px-md py-sm rounded-full bg-surface-container-low text-text-muted font-body-secondary text-body-secondary active:scale-95 transition-all">Marché</button>
</div>
<!-- Groups -->
<div class="space-y-lg">
<!-- Group: Aujourd'hui -->
<section>
<h2 class="font-h3 text-h3 text-text-main mb-card-gap">Aujourd'hui</h2>
<div class="space-y-card-gap">
<!-- Notification 1 (Unread) -->
<div class="bg-[#EBF4FB] rounded-xl p-md shadow-sm border border-primary-container/20 relative overflow-hidden active:scale-[0.99] transition-transform">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary-container rounded-l-xl"></div>
<div class="flex gap-md">
<div class="w-12 h-12 rounded-full bg-white flex flex-shrink-0 items-center justify-center text-primary-container shadow-sm">
<span class="material-symbols-outlined" data-icon="work" data-weight="fill" style="font-variation-settings: 'FILL' 1;">work</span>
</div>
<div class="flex-1">
<p class="font-body-main text-body-main text-text-main font-semibold mb-1">Nouvelle candidature pour votre mission Récolte</p>
<p class="font-body-secondary text-body-secondary text-text-muted mb-3">Il y a 5 min</p>
<button class="w-full h-[40px] rounded-lg bg-surface text-primary-container border border-primary-container/30 font-button-label text-button-label active:scale-97 transition-all shadow-sm">Voir la candidature</button>
</div>
</div>
</div>
</div>
</section>
<!-- Group: Hier -->
<section>
<h2 class="font-h3 text-h3 text-text-main mb-card-gap">Hier</h2>
<div class="space-y-card-gap">
<!-- Notification 2 (Read) -->
<div class="bg-surface rounded-xl p-md shadow-sm border border-border active:scale-[0.99] transition-transform">
<div class="flex gap-md">
<div class="w-12 h-12 rounded-full bg-success-light flex flex-shrink-0 items-center justify-center text-success shadow-sm">
<span class="material-symbols-outlined" data-icon="payments" data-weight="fill" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div class="flex-1">
<p class="font-body-main text-body-main text-text-main mb-1">Paiement de 45 000 FCFA reçu</p>
<p class="font-body-secondary text-body-secondary text-text-muted mb-3">Hier</p>
<button class="w-full h-[40px] rounded-lg bg-surface text-text-main border border-border font-button-label text-button-label active:scale-97 transition-all shadow-sm hover:bg-surface-container-low">Voir le portefeuille</button>
</div>
</div>
</div>
</div>
</section>
<!-- Group: Cette semaine -->
<section>
<h2 class="font-h3 text-h3 text-text-main mb-card-gap">Cette semaine</h2>
<div class="space-y-card-gap">
<!-- Notification 3 (Read) -->
<div class="bg-surface rounded-xl p-md shadow-sm border border-border active:scale-[0.99] transition-transform">
<div class="flex gap-md">
<div class="w-12 h-12 rounded-full bg-warning-light flex flex-shrink-0 items-center justify-center text-warning shadow-sm">
<span class="material-symbols-outlined" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="flex-1">
<p class="font-body-main text-body-main text-text-main mb-1">Vous avez reçu un nouvel avis</p>
<p class="font-body-secondary text-body-secondary text-text-muted">Il y a 2 jours</p>
</div>
</div>
</div>
</div>
