<!DOCTYPE html>

        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Custom Select Styling */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }

        /* Hide scrollbar for chips container */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-text-main font-body-main antialiased min-h-screen relative pb-[120px] pt-16">
<!-- Contextual Top App Bar (Task-Focused: Suppresses standard navigation) -->
<header class="fixed top-0 w-full z-50 h-16 bg-surface flex items-center justify-between px-5 border-b border-border">
<button aria-label="Retour" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface">
<span class="material-symbols-outlined">close</span>
</button>
<span class="font-h3 text-h3 text-on-surface">Publier</span>
<div class="w-10 h-10"></div> <!-- Spacer for center alignment -->
</header>
<main class="max-w-md mx-auto w-full pt-6">
<!-- Horizontal Stepper -->
<div class="px-screen-edge mb-section-v">
<div class="flex items-center justify-between w-full relative">
<!-- Step 1: Active -->
<div class="flex flex-col items-center relative z-10 w-1/3">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary flex items-center justify-center font-button-label text-button-label text-[14px] shadow-[0_4px_10px_rgba(27,108,168,0.2)]">
                        1
                    </div>
<span class="font-body-secondary text-body-secondary text-xs mt-2 text-primary-container font-semibold">Description</span>
</div>
<!-- Connector 1-2 -->
<div class="absolute top-4 left-1/6 w-1/3 h-[2px] bg-border -z-10 translate-x-1/2"></div>
<!-- Step 2: Inactive -->
<div class="flex flex-col items-center relative z-10 w-1/3">
<div class="w-8 h-8 rounded-full bg-surface border-[1.5px] border-border text-outline flex items-center justify-center font-button-label text-button-label text-[14px]">
                        2
                    </div>
<span class="font-body-secondary text-body-secondary text-xs mt-2 text-outline">Conditions</span>
</div>
<!-- Connector 2-3 -->
<div class="absolute top-4 left-1/2 w-1/3 h-[2px] bg-border -z-10 translate-x-1/2"></div>
<!-- Step 3: Inactive -->
<div class="flex flex-col items-center relative z-10 w-1/3">
<div class="w-8 h-8 rounded-full bg-surface border-[1.5px] border-border text-outline flex items-center justify-center font-button-label text-button-label text-[14px]">
                        3
                    </div>
<span class="font-body-secondary text-body-secondary text-xs mt-2 text-outline">Validation</span>
</div>
</div>
</div>
<div class="px-screen-edge">
<h1 class="font-h1 text-h1 text-on-surface mb-8">Nouvelle offre de travail</h1>
<form class="space-y-form-gap">
<!-- CHAMP: Type de travail -->
<div class="flex flex-col">
<label class="font-body-secondary text-body-secondary text-on-surface-variant mb-1.5 font-medium" for="job-type">Type de travail</label>
<div class="relative">
<select class="w-full min-h-[52px] border-[1.5px] border-border rounded-lg bg-surface px-4 py-3 pr-12 text-body-main font-body-main text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-fixed outline-none transition-all shadow-sm" id="job-type">
<option disabled="" selected="" value="">Sélectionner une activité</option>
<option value="semis">🌱 Semis</option>
<option value="recolte">🌾 Récolte</option>
<option value="debroussaillage">✂️ Débroussaillage</option>
<option value="plantation">🌲 Plantation</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- CHAMP: Description des tâches -->
<div class="flex flex-col">
<label class="font-body-secondary text-body-secondary text-on-surface-variant mb-1.5 font-medium" for="description">Description des tâches</label>
<textarea class="w-full border-[1.5px] border-border rounded-lg bg-surface px-4 py-3 text-body-main font-body-main text-on-surface placeholder:text-text-muted focus:border-primary-container focus:ring-2 focus:ring-primary-fixed outline-none transition-all shadow-sm resize-none" id="description" placeholder="Détaillez les actions à effectuer, le type de terrain..." rows="4"></textarea>
</div>
<!-- CHAMP: Nombre de travailleurs requis -->
<div class="flex flex-col">
<label class="font-body-secondary text-body-secondary text-on-surface-variant mb-1.5 font-medium">Nombre de travailleurs requis</label>
<div class="flex items-center justify-between border-[1.5px] border-border rounded-lg bg-surface h-[52px] px-1 shadow-sm">
<button class="w-[44px] h-[44px] flex items-center justify-center rounded-md bg-surface-container-low text-on-surface hover:bg-surface-container active:scale-95 transition-all" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="font-button-label text-button-label text-on-surface text-[18px]">2</span>
<button class="w-[44px] h-[44px] flex items-center justify-center rounded-md bg-primary-fixed text-on-primary-fixed-variant hover:bg-primary-fixed-dim active:scale-95 transition-all" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- CHAMP: Date de début -->
<div class="flex flex-col">
<label class="font-body-secondary text-body-secondary text-on-surface-variant mb-1.5 font-medium" for="start-date">Date de début</label>
<div class="relative">
<input class="w-full min-h-[52px] border-[1.5px] border-border rounded-lg bg-surface px-4 py-3 text-body-main font-body-main text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-fixed outline-none transition-all shadow-sm appearance-none" id="start-date" type="date"/>
</div>
</div>
<!-- CHAMP: Durée estimée -->
<div class="flex flex-col">
<label class="font-body-secondary text-body-secondary text-on-surface-variant mb-1.5 font-medium" for="duration">Durée estimée</label>
<div class="relative">
<select class="w-full min-h-[52px] border-[1.5px] border-border rounded-lg bg-surface px-4 py-3 pr-10 text-body-main font-body-main text-on-surface focus:border-primary-container focus:ring-2 focus:ring-primary-fixed outline-none transition-all shadow-sm" id="duration">
<option value="1j">1 jour</option>
<option value="2j">2-3 jours</option>
<option value="1s">1 semaine</option>
<option value="plus">+ d'une semaine</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- CHAMP: Horaires attendus -->
<div class="flex flex-col">
<label class="font-body-secondary text-body-secondary text-on-surface-variant mb-1.5 font-medium" for="hours">Horaires attendus</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">schedule</span>
<input class="w-full min-h-[52px] border-[1.5px] border-border rounded-lg bg-surface pl-12 pr-4 py-3 text-body-main font-body-main text-on-surface placeholder:text-text-muted focus:border-primary-container focus:ring-2 focus:ring-primary-fixed outline-none transition-all shadow-sm" id="hours" placeholder="Ex: 06h00 - 14h00" type="text"/>
</div>
</div>
<!-- CHAMP: Outils fournis (Multi-select chips) -->
<div class="flex flex-col pt-2">
<label class="font-body-secondary text-body-secondary text-on-surface-variant mb-3 font-medium">Outils fournis</label>
<div class="flex flex-wrap gap-3">
<!-- Selected Chip -->
<div class="px-4 py-2.5 rounded-full bg-primary-fixed text-on-primary-fixed-variant font-body-secondary text-body-secondary font-medium flex items-center gap-2 cursor-pointer active:scale-95 transition-transform shadow-sm">
<span class="material-symbols-outlined text-[18px]">check</span>
                            Gants
                        </div>
<!-- Unselected Chips -->
<div class="px-4 py-2.5 rounded-full bg-surface border-[1.5px] border-border text-on-surface font-body-secondary text-body-secondary flex items-center gap-2 cursor-pointer hover:border-outline-variant active:scale-95 transition-transform shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
                            Sécateur
                        </div>
<div class="px-4 py-2.5 rounded-full bg-surface border-[1.5px] border-border text-on-surface font-body-secondary text-body-secondary flex items-center gap-2 cursor-pointer hover:border-outline-variant active:scale-95 transition-transform shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
                            Bottes
                        </div>
<div class="px-4 py-2.5 rounded-full bg-surface border-[1.5px] border-border text-on-surface font-body-secondary text-body-secondary flex items-center gap-2 cursor-pointer hover:border-outline-variant active:scale-95 transition-transform shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
                            Panier
                        </div>
<div class="px-4 py-2.5 rounded-full bg-surface border-[1.5px] border-border text-on-surface font-body-secondary text-body-secondary flex items-center gap-2 cursor-pointer hover:border-outline-variant active:scale-95 transition-transform shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-[18px] text-outline">add</span>
                            Autre
                        </div>
</div>
</div>
</form>
</div>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-border p-screen-edge pb-8 shadow-[0_-8px_24px_rgba(0,0,0,0.06)] z-40 md:relative md:bg-transparent md:border-none md:shadow-none md:pb-0 md:pt-8 md:p-screen-edge">
<div class="max-w-md mx-auto">
<button class="w-full h-[52px] bg-primary-container text-on-primary rounded-lg font-button-label text-button-label flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-[0_4px_14px_rgba(27,108,168,0.25)] hover:opacity-90">
                Étape suivante →
            </button>
</div>
</div>
</body></html>
