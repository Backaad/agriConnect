<body class="bg-background min-h-screen flex flex-col font-body-main text-text-main">
<!-- Top Navigation Area (Transactional/Linear flow, no standard app bar, simple back and progress) -->
<header class="w-full bg-surface sticky top-0 z-50 pt-safe pb-4 shadow-[0_1px_3px_rgba(0,0,0,0.02)]">
<div class="px-screen-edge flex items-center justify-between h-16">
<button aria-label="Retour" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low hover:bg-surface-container transition-colors active:scale-95 text-text-main">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-body-secondary text-body-secondary text-text-muted">
                Étape 1 sur 4
            </div>
<div class="w-10"></div> <!-- Placeholder for balance -->
</div>
<!-- Progress Bar -->
<div class="px-screen-edge mt-2">
<div class="w-full h-1.5 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary-container rounded-full transition-all duration-300" style="width: 25%;"></div>
</div>
</div>
</header>
<main class="flex-grow flex flex-col px-screen-edge pt-lg pb-3xl">
<div class="mb-lg">
<h1 class="font-h1 text-h1 text-text-main mb-sm">Votre identité</h1>
<p class="font-body-secondary text-body-secondary text-text-muted">Veuillez fournir vos informations personnelles telles qu'elles apparaissent sur votre document d'identité officiel.</p>
</div>
<form class="flex flex-col gap-form-gap">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-body-secondary text-body-secondary text-on-surface-variant font-medium" for="fullname">Nom complet</label>
<input class="w-full h-12 px-4 bg-surface border-[1.5px] border-border rounded-lg text-text-main font-body-main text-body-main focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all placeholder:text-text-muted" id="fullname" placeholder="Ex: Jean Dupont" type="text"/>
</div>
<!-- Date of Birth -->
<div class="flex flex-col gap-xs">
<label class="font-body-secondary text-body-secondary text-on-surface-variant font-medium" for="dob">Date de naissance</label>
<div class="relative">
<input class="w-full h-12 pl-4 pr-12 bg-surface border-[1.5px] border-border rounded-lg text-text-main font-body-main text-body-main focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all placeholder:text-text-muted" id="dob" placeholder="JJ/MM/AAAA" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<!-- Gender (Radio Group represented as segmented controls for better touch UI) -->
<div class="flex flex-col gap-xs">
<span class="font-body-secondary text-body-secondary text-on-surface-variant font-medium">Sexe</span>
<div class="flex gap-2 bg-surface-container-low p-1 rounded-lg">
<label class="flex-1 text-center cursor-pointer">
<input checked="" class="peer sr-only" name="gender" type="radio" value="homme"/>
<div class="py-2.5 rounded-md font-body-secondary text-body-secondary text-text-muted peer-checked:bg-surface peer-checked:text-text-main peer-checked:shadow-sm peer-checked:font-medium transition-all">Homme</div>
</label>
<label class="flex-1 text-center cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="femme"/>
<div class="py-2.5 rounded-md font-body-secondary text-body-secondary text-text-muted peer-checked:bg-surface peer-checked:text-text-main peer-checked:shadow-sm peer-checked:font-medium transition-all">Femme</div>
</label>
<label class="flex-1 text-center cursor-pointer">
<input class="peer sr-only" name="gender" type="radio" value="autre"/>
<div class="py-2.5 rounded-md font-body-secondary text-body-secondary text-text-muted peer-checked:bg-surface peer-checked:text-text-main peer-checked:shadow-sm peer-checked:font-medium transition-all">Autre</div>
</label>
</div>
</div>
<!-- Region / City Dropdown -->
<div class="flex flex-col gap-xs">
<label class="font-body-secondary text-body-secondary text-on-surface-variant font-medium" for="region">Région / Ville</label>
<div class="relative">
<select class="w-full h-12 pl-4 pr-12 bg-surface border-[1.5px] border-border rounded-lg text-text-main font-body-main text-body-main focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all appearance-none cursor-pointer" id="region">
<option disabled="" selected="" value="">Sélectionnez votre région</option>
<option value="dakar">Dakar</option>
<option value="thies">Thiès</option>
<option value="saint-louis">Saint-Louis</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Address with Location Icon -->
<div class="flex flex-col gap-xs">
<label class="font-body-secondary text-body-secondary text-on-surface-variant font-medium" for="address">Adresse</label>
<div class="flex gap-2">
<input class="flex-grow h-12 px-4 bg-surface border-[1.5px] border-border rounded-lg text-text-main font-body-main text-body-main focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all placeholder:text-text-muted" id="address" placeholder="Entrez votre adresse complète" type="text"/>
<button aria-label="Localiser mon adresse" class="w-12 h-12 flex-shrink-0 bg-surface-container-low border-[1.5px] border-border rounded-lg flex items-center justify-center text-primary-container hover:bg-surface-container active:scale-95 transition-all" type="button">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
</div>
</form>
</main>
<!-- Bottom Sticky Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-screen-edge bg-gradient-to-t from-background via-background to-transparent pb-8">
<button class="w-full h-[52px] bg-primary-container text-on-primary rounded-lg font-button-label text-button-label flex items-center justify-center shadow-[0_4px_12px_rgba(27,108,168,0.2)] active:scale-[0.97] transition-transform duration-150 relative overflow-hidden">
            Continuer
            <!-- subtle gradient overlay for tactile feel -->
<div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent pointer-events-none"></div>
</button>
</div>
