<body class="bg-background min-h-screen font-body-main text-on-background flex flex-col antialiased">
<!-- Top Navigation (Suppressed for transactional screen, but back button provided contextually) -->
<header class="w-full h-16 px-screen-edge flex items-center justify-start z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface shadow-sm text-text-main active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-screen-edge pt-xl pb-2xl max-w-md mx-auto w-full">
<!-- Header Section -->
<div class="flex flex-col items-center text-center mb-xl">
<!-- Icon Wrapper -->
<div class="w-20 h-20 rounded-full bg-primary-fixed flex items-center justify-center mb-form-gap shadow-[0_8px_16px_rgba(27,108,168,0.12)]">
<span class="material-symbols-outlined text-4xl text-primary-container" data-icon="mark_email_unread" style="font-variation-settings: 'FILL' 1;">mark_email_unread</span>
</div>
<h1 class="font-h1 text-h1 text-text-main mb-sm">Vérifiez votre numéro</h1>
<p class="font-body-main text-body-main text-text-muted">
                Code envoyé au <span class="font-bold text-text-main">+237 6XX XXX XXX</span>
</p>
<button class="mt-xs font-button-label text-button-label text-primary-container hover:text-primary active:scale-95 transition-transform">
                Modifier le numéro
            </button>
</div>
<!-- OTP Input Section -->
<div class="flex flex-col items-center w-full mb-section-v">
<div class="flex justify-between w-full max-w-[340px] gap-2">
<!-- Active Input -->
<input class="w-[52px] h-[52px] rounded-lg border-2 border-primary-container bg-surface text-center font-h2 text-h2 text-text-main shadow-[0_4px_12px_rgba(27,108,168,0.08)] outline-none focus:ring-0 focus:border-primary-container transition-all" inputmode="numeric" maxlength="1" type="text" value="4"/>
<!-- Inactive Inputs -->
<input class="w-[52px] h-[52px] rounded-lg border-[1.5px] border-border bg-surface-container-lowest text-center font-h2 text-h2 text-text-main shadow-sm outline-none focus:border-primary-container transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input class="w-[52px] h-[52px] rounded-lg border-[1.5px] border-border bg-surface-container-lowest text-center font-h2 text-h2 text-text-main shadow-sm outline-none focus:border-primary-container transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input class="w-[52px] h-[52px] rounded-lg border-[1.5px] border-border bg-surface-container-lowest text-center font-h2 text-h2 text-text-main shadow-sm outline-none focus:border-primary-container transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input class="w-[52px] h-[52px] rounded-lg border-[1.5px] border-border bg-surface-container-lowest text-center font-h2 text-h2 text-text-main shadow-sm outline-none focus:border-primary-container transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input class="w-[52px] h-[52px] rounded-lg border-[1.5px] border-border bg-surface-container-lowest text-center font-h2 text-h2 text-text-main shadow-sm outline-none focus:border-primary-container transition-all" inputmode="numeric" maxlength="1" type="text"/>
</div>
<!-- Timer -->
<div class="mt-form-gap flex items-center justify-center space-x-2 text-text-muted font-body-secondary text-body-secondary">
<span class="material-symbols-outlined text-sm" data-icon="schedule">schedule</span>
<span>Renvoyer le code dans <span class="font-bold text-text-main">59s</span></span>
</div>
</div>
<!-- Action Area (Pushed to bottom on mobile if needed, but keeping flow here) -->
<div class="mt-auto pt-lg">
<button class="w-full h-[52px] rounded-lg bg-primary-container text-on-primary font-button-label text-button-label flex items-center justify-center shadow-[0_4px_12px_rgba(27,108,168,0.2)] active:scale-97 transition-transform opacity-50 cursor-not-allowed">
                Vérifier
            </button>
<div class="mt-lg flex flex-col items-center justify-center text-center gap-xs">
<span class="font-body-secondary text-body-secondary text-text-muted">Vous n'avez pas reçu le code ?</span>
<button class="font-button-label text-button-label text-text-muted opacity-50 cursor-not-allowed">
                    Renvoyer le SMS
                </button>
</div>
</div>
