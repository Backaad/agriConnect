server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: kyc-service
          uri: lb://kyc-service
          predicates:
            - Path=/api/kyc/**
        - id: marketplace-service
          uri: lb://marketplace-service
          predicates:
            - Path=/api/marketplace/**
        - id: geo-service
          uri: lb://geo-service
          predicates:
            - Path=/api/geo/**
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
        - id: messaging-service
          uri: lb://messaging-service
          predicates:
            - Path=/api/messages/**
        - id: labor-service
          uri: lb://labor-service
          predicates:
            - Path=/api/labor/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
