name: Deploy — Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: mvn clean package -DskipTests -Pprod

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker images
        run: |
          docker build -t agriconnect/auth-service:${{ github.sha }} ./auth-service
          docker build -t agriconnect/user-service:${{ github.sha }} ./user-service
          docker build -t agriconnect/labor-service:${{ github.sha }} ./labor-service
          docker push agriconnect/auth-service:${{ github.sha }}
          docker push agriconnect/user-service:${{ github.sha }}
          docker push agriconnect/labor-service:${{ github.sha }}
